<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>BMI 결과</title>
</head>
<body>
    <div class="container">
        <h1>BMI 계산 결과</h1>

        <nav class="nav-menu">
            <a href="/">메인</a>
            <a href="/bmi">BMI 입력</a>
            <a href="/history">이력 보기</a>
            <a href="/statistics/">통계</a>
        </nav>

        <div class="result-box">
            <p>신장: <strong>{{ height }} cm</strong></p>
            <p>체중: <strong>{{ weight }} kg</strong></p>
            <p>BMI 지수: <strong>{{ bmi }}</strong></p>
            <p>분류: <strong>{{ category }}</strong></p>
            <p>결과가 데이터베이스에 저장되었습니다.</p>
        </div>

        <div class="bmi-info">
            <h2>BMI 범주 안내</h2>
            <ul>
                <li>저체중: 18.5 미만</li>
                <li>정상: 18.5 - 22.9</li>
                <li>과체중: 23 - 24.9</li>
                <li>비만: 25 - 29.9</li>
                <li>고도비만: 30 이상</li>
            </ul>
        </div>
    </div>
</body>
</html>
